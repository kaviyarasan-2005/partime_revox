<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Page not found — LeatherCraft Bindery. The page you were looking for doesn't exist. Return to our homepage or explore our collections." />

  <link rel="stylesheet" href="../assets/css/variables.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/animations.css" />
  <link rel="stylesheet" href="../assets/css/navbar.css" />
  <link rel="stylesheet" href="../assets/css/footer.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--navbar-height) var(--container-padding) var(--space-16);
      text-align: center;
      background: var(--color-bg);
      position: relative;
      overflow: hidden;
    }

    .error-page::before {
      content: '404';
      position: absolute;
      font-family: var(--font-heading);
      font-size: clamp(16rem, 35vw, 28rem);
      font-weight: 700;
      color: var(--color-border);
      opacity: 0.35;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      line-height: 1;
      top: 50%;
      transform: translateY(-50%);
    }

    [data-theme="dark"] .error-page::before { opacity: 0.12; }

    .error-content {
      position: relative;
      z-index: 1;
      max-width: 600px;
    }

    .error-logo {
      display: flex;
      justify-content: center;
      margin-bottom: var(--space-8);
      animation: fade-in-down 0.6s ease both;
    }

    .error-logo a {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      text-decoration: none;
    }

    .error-logo__icon {
      width: 52px;
      height: 52px;
      color: var(--color-primary);
    }

    .error-logo__name {
      font-family: var(--font-heading);
      font-size: var(--font-size-xl);
      font-weight: 700;
      color: var(--color-text-primary);
    }

    .error-code {
      font-size: var(--font-size-xs);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: var(--space-4);
      animation: fade-in-up 0.6s ease 0.1s both;
    }

    .error-title {
      font-size: clamp(2rem, 4vw, 3.25rem);
      margin-bottom: var(--space-4);
      animation: fade-in-up 0.6s ease 0.2s both;
    }

    .error-text {
      color: var(--color-text-secondary);
      font-size: var(--font-size-lg);
      line-height: 1.7;
      margin-bottom: var(--space-10);
      animation: fade-in-up 0.6s ease 0.3s both;
    }

    .error-ctas {
      display: flex;
      gap: var(--space-4);
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: var(--space-12);
      animation: fade-in-up 0.6s ease 0.4s both;
    }

    .error-quick-links {
      animation: fade-in-up 0.6s ease 0.5s both;
    }

    .error-quick-links__label {
      font-size: var(--font-size-xs);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: var(--space-4);
    }

    .error-links {
      display: flex;
      gap: var(--space-3);
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-link {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      background: var(--color-bg-alt);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--color-text-secondary);
      transition: all var(--transition-base);
    }

    .error-link:hover {
      background: var(--color-primary);
      color: white;
      border-color: var(--color-primary);
    }

    /* Decorative journal illustration */
    .error-illustration {
      width: 200px;
      height: 200px;
      margin-inline: auto;
      margin-bottom: var(--space-8);
      position: relative;
      animation: float 5s ease-in-out infinite;
    }
  </style>
  <script src="../assets/js/theme.js"></script>
</head>
<body>

<!-- Minimal Navbar -->

      </div>
      <div class="navbar__brand-text">
        <span class="navbar__brand-name">LeatherCraft</span>
      </div>

    <div class="navbar__controls">

        <span class="rtl-label">RTL</span>

        <svg class="icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>

    </div>
  </div>
</header>

          <a href="about.html" class="error-link">

          <a href="contact.html" class="error-link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.09h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>

</main>

<script src="../assets/js/navbar.js"></script>
<script src="../assets/js/main.js"></script>
