<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calibration Grid Deploying — Coming Soon | Nexo</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/utilities.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563EB' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3Cline x1='22' y1='12' x2='18' y2='12'/%3E%3Cline x1='6' y1='12' x2='2' y2='12'/%3E%3Cline x1='12' y1='6' x2='12' y2='2'/%3E%3Cline x1='12' y1='22' x2='12' y2='18'/%3E%3C/svg%3E">
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column; background: var(--gradient-primary); color: #FFFFFF; justify-content: center;">

  <div class="container text-center max-w-2xl py-12">
    
    <!-- Logo -->
    <div class="logo-wrapper mb-8" style="display: inline-flex; align-items: center; gap: var(--space-3);">
      <div class="logo-icon" style="background: var(--gradient-accent); color: #FFFFFF; padding: var(--space-2); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-crosshair" style="width: 24px; height: 24px;"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg>
      </div>
      <span class="logo-text" style="font-family: var(--font-heading); font-size: var(--text-2xl); font-weight: var(--weight-bold);">Nexo</span>
    </div>

    <h1 class="text-3xl md:text-4xl font-bold mb-4">Calibration System Grid Deploying</h1>
    <p class="text-slate-300 mb-12 max-w-md mx-auto">We are launching our automated scheduling platform and B2B portal integrations. Stay tuned for launch!</p>

    <!-- Countdown Timer -->
    <div class="countdown flex justify-center gap-6 mb-12">
      <div class="countdown-card" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius-xl); padding: var(--space-4); min-width: 90px;">
        <div id="countdown-days" class="text-3xl font-bold text-accent">00</div>
        <span class="text-xs text-text-muted uppercase">Days</span>
      </div>
      <div class="countdown-card" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius-xl); padding: var(--space-4); min-width: 90px;">
        <div id="countdown-hours" class="text-3xl font-bold text-accent">00</div>
        <span class="text-xs text-text-muted uppercase">Hours</span>
      </div>
      <div class="countdown-card" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius-xl); padding: var(--space-4); min-width: 90px;">
        <div id="countdown-minutes" class="text-3xl font-bold text-accent">00</div>
        <span class="text-xs text-text-muted uppercase">Minutes</span>
      </div>
      <div class="countdown-card" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius-xl); padding: var(--space-4); min-width: 90px;">
        <div id="countdown-seconds" class="text-3xl font-bold text-accent">00</div>
        <span class="text-xs text-text-muted uppercase">Seconds</span>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-container mb-12 max-w-md mx-auto">
      <div class="flex justify-between text-xs text-slate-400 mb-2">
        <span>Calibration Rig Alignment</span>
        <span>82% Completed</span>
      </div>
      <div class="progress-bar-bg" style="width: 100%; height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: var(--radius-full); overflow: hidden;">
        <div class="progress-bar-fill" style="width: 82%; height: 100%; background: var(--gradient-accent); border-radius: var(--radius-full);"></div>
      </div>
    </div>

    <!-- Email Signup -->
    <div class="form-wrapper max-w-md mx-auto mb-12">
      <form class="newsletter-form" onsubmit="event.preventDefault(); alert('Subscribed successfully!');">
        <input type="email" placeholder="Enter shop email" required aria-label="Email" style="min-height: 48px;">
        <button type="submit" class="btn btn-primary" style="min-height: 48px;">Notify Me</button>
      </form>
    </div>

    <!-- Social Links & back button -->
    <div class="flex justify-center gap-4 mb-4">
      <a href="../index.html" class="btn-link text-slate-300" style="text-decoration: none;"><i data-lucide="arrow-left" class="inline-block mr-1"></i> Back to Homepage</a>
    </div>

  </div>

  <!-- Lucide Icons & Scripts -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
