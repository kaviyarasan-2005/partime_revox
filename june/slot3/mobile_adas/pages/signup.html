<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Shop Account | Nexo</title>
  <meta name="description" content="Register your collision shop or repair center to access volume pricing and schedule calibrations.">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/utilities.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
  
  <style>
    .auth-layout {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg);
      padding: var(--space-8);
      position: relative;
      overflow: hidden;
      transition: background var(--transition-theme);
    }
    
    .auth-layout::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 80% 20%, rgba(37, 99, 235, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .auth-card {
      width: 100%;
      max-width: 500px;
      z-index: 1;
      padding: var(--space-8);
      border: 1px solid var(--color-glass-border);
    }
    
    .auth-actions {
      position: absolute;
      inset-block-start: var(--space-4);
      inset-inline-end: var(--space-4);
      display: flex;
      gap: var(--space-2);
      z-index: 10;
    }

    /* Better outline contrast for input fields in light theme */
    [data-theme="light"] .form-input {
      border-color: #CBD5E1;
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: var(--space-6);
      }
    }
  </style>
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563EB' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3Cline x1='22' y1='12' x2='18' y2='12'/%3E%3Cline x1='6' y1='12' x2='2' y2='12'/%3E%3Cline x1='12' y1='6' x2='12' y2='2'/%3E%3Cline x1='12' y1='22' x2='12' y2='18'/%3E%3C/svg%3E">
</head>
<body style="margin: 0;">

  <main class="auth-layout">
    <!-- Floating Theme/RTL Actions -->
    <div class="auth-actions">
      <button class="nav-toggle-btn rtl-toggle" aria-label="Toggle RTL Mode" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-2) var(--space-3); cursor: pointer; color: var(--color-text); height: 40px; display: flex; align-items: center; justify-content: center;">
        <span class="toggle-label" style="font-size: var(--text-xs); font-weight: var(--weight-bold);">RTL</span>
      </button>
      <button class="nav-toggle-btn theme-toggle" aria-label="Toggle Theme" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-2) var(--space-3); cursor: pointer; color: var(--color-text); height: 40px; display: flex; align-items: center; justify-content: center;">
        <i data-lucide="moon" style="width: 18px; height: 18px;"></i>
      </button>
    </div>

    <div class="card auth-card animate-on-scroll visible">
      
      <!-- Brand Logo Header -->
      <div class="text-center mb-4">
        <a href="../index.html" class="navbar-logo justify-center mb-4" style="text-decoration: none; display: inline-flex;">
          <div class="logo-icon" style="width: 36px; height: 36px;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-crosshair" style="width: 20px; height: 20px;"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg>
          </div>
          <span class="logo-text" style="font-size: var(--text-lg);">Nexo</span>
        </a>
        <h1 class="font-bold" style="font-size: var(--text-xl);">Register</h1>
        <p class="text-text-muted text-sm mt-3">Unlock fast dynamic/static calibration dispatch options.</p>
      </div>

      <!-- Auth Form -->
      <form class="validate-form flex flex-col gap-4" onsubmit="event.preventDefault(); alert('Account registration successful! Welcome to Nexo.'); window.location.href='user-dashboard.html';">
        <div class="form-row grid grid-2">
          <div class="form-group">
            <label for="register-name" class="form-label">Contact Name *</label>
            <input type="text" id="register-name" required class="form-input" placeholder="Sarah Vance">
          </div>
          
          <div class="form-group">
            <label for="register-company" class="form-label">Shop / Company Name *</label>
            <input type="text" id="register-company" required class="form-input" placeholder="Apex Collision">
          </div>
        </div>

        <div class="form-row grid grid-2">
          <div class="form-group">
            <label for="register-email" class="form-label">Email Address *</label>
            <input type="email" id="register-email" required class="form-input" placeholder="manager@apexcollision.com">
          </div>
          
          <div class="form-group">
            <label for="register-phone" class="form-label">Phone Number *</label>
            <input type="tel" id="register-phone" required class="form-input" placeholder="(555) 399-2811">
          </div>
        </div>

        <div class="form-group">
          <label for="register-password" class="form-label">Create Password *</label>
          <input type="password" id="register-password" required class="form-input" placeholder="••••••••" minlength="8">
        </div>

        <div class="flex items-start gap-2 mb-2">
          <input type="checkbox" id="terms-agree" required style="cursor: pointer; margin-top: 3px;">
          <label for="terms-agree" class="text-xs text-text-secondary" style="cursor: pointer; user-select: none; line-height: var(--leading-normal);">I agree to the Nexo <a href="#" onclick="alert('Displaying Calibration Terms of Service...');" class="text-accent">Terms of Service</a> and confirm our workshop space complies with OEM safe flat-level requirements.</label>
        </div>

        <button type="submit" class="btn btn-primary w-full text-center" style="font-size: var(--text-sm);">Create Account</button>
      </form>

      <div class="relative flex items-center justify-center my-6" style="margin: var(--space-6) 0;">
        <div class="absolute inset-x-0 border-top" style="position: absolute; left: 0; right: 0; border-top: 1px solid var(--color-border);"></div>
        <span class="relative px-4 text-xs text-text-muted" style="background: var(--color-surface); padding: 0 var(--space-3); position: relative; z-index: 1;">Or sign up with</span>
      </div>

      <div class="grid grid-2 gap-3 mb-6" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-3); margin-bottom: var(--space-6);">
        <button type="button" class="btn flex items-center justify-center gap-2" style="background: transparent; border: 1.5px solid #CBD5E1; color: var(--color-text); font-size: var(--text-xs);">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button type="button" class="btn flex items-center justify-center gap-2" style="background: transparent; border: 1.5px solid #CBD5E1; color: var(--color-text); font-size: var(--text-xs);">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.04 2.24-.7 3.59-.7 1.34.02 2.53.53 3.36 1.44-2.87 1.66-2.4 5.6.43 6.88-1.05 2.15-2.07 4.14-2.46 4.55zm-5.26-13.6c-.16-1.52.61-3.07 1.67-4.04-1.08-1.55-2.9-1.84-3.5-1.87-.2 1.54.55 3.05 1.63 4.02 1.12 1.05 2.66 1.31 3.51 1.25z"/></svg>
          Apple
        </button>
      </div>

      <div class="text-center mt-6 pt-6 border-top" style="border-top: 1px solid var(--color-border);">
        <p class="text-sm text-text-secondary">Already registered? <a href="login.html" class="text-accent font-semibold" style="text-decoration: none;">Sign In</a></p>
      </div>

    </div>
  </main>

  <!-- Lucide Icons & Scripts -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
