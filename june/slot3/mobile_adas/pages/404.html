<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal Lost — Page Not Found | Nexo</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/utilities.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563EB' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3Cline x1='22' y1='12' x2='18' y2='12'/%3E%3Cline x1='6' y1='12' x2='2' y2='12'/%3E%3Cline x1='12' y1='6' x2='12' y2='2'/%3E%3Cline x1='12' y1='22' x2='12' y2='18'/%3E%3C/svg%3E">
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column; background: var(--gradient-primary); color: #FFFFFF;">

  <!-- Navbar Placeholder (Injected via navbar.js) -->
  <div id="navbar-placeholder"></div>

  <!-- Main Content Centered for 404 -->
  <main class="main-content flex items-center justify-center" style="flex: 1; padding: calc(var(--navbar-height) + var(--space-8)) var(--space-6);">
    <div class="container text-center max-w-xl">
      
      <!-- CSS Radar Sweep Animation -->
      <div class="radar-container" style="position: relative; width: 160px; height: 160px; margin: 0 auto 32px; border: 2px solid rgba(37, 99, 235, 0.3); border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center;">
        <!-- Sweep hand -->
        <div class="radar-sweep" style="position: absolute; width: 50%; height: 50%; top: 0; left: 50%; transform-origin: bottom left; background: linear-gradient(45deg, rgba(16, 185, 129, 0.4), transparent); border-radius: 100% 0 0 0; animation: sweep 3s linear infinite;"></div>
        <!-- Concentric circles -->
        <div style="position: absolute; width: 110px; height: 110px; border: 1px dashed rgba(37, 99, 235, 0.2); border-radius: var(--radius-full);"></div>
        <div style="position: absolute; width: 60px; height: 60px; border: 1px solid rgba(37, 99, 235, 0.2); border-radius: var(--radius-full);"></div>
        <!-- Blip pin -->
        <i data-lucide="alert-triangle" class="text-success" style="width: 24px; height: 24px; position: relative; z-index: 1;"></i>
      </div>

      <h1 class="font-heading text-6xl font-bold mb-2 text-white" style="letter-spacing: var(--tracking-wider);">404</h1>
      <h2 class="text-xl font-semibold text-accent mb-4">Signal Lost — Sensor Uncalibrated</h2>
      <p class="text-slate-300 mb-8 max-w-md mx-auto">We searched our safety grids, but the requested page seems to have moved outside our target field of view.</p>
      
      <div class="flex justify-center gap-4">
        <a href="../index.html" class="btn btn-primary bg-accent text-white border-accent">Return Home</a>
        <a href="contact.html" class="btn btn-secondary border-slate-700 text-white">Contact Dispatch</a>
      </div>

    </div>
  </main>

  <!-- CSS Animation Injection -->
  <style>
    @keyframes sweep {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Footer Placeholder (Injected via footer.js) -->
  <div id="footer-placeholder"></div>

  <!-- Lucide Icons & Scripts -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../assets/js/navbar.js"></script>
  <script src="../assets/js/footer.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
