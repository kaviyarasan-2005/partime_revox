<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="BAND Page Not Found — Lost in the wild? Find your way back to our collections of premium active silicone rings, size guides, and bundle deals." />
  <meta property="og:title" content="BAND — Page Not Found | Lost in the Wild" />
  <meta property="og:image" content="https://images.unsplash.com/photo-1522163182402-834f871fd851?w=1200&q=80" />
  <link rel="canonical" href="404.html" />
  <title>BAND — Page Not Found | Lost in the Wild</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />

  <style>
    .error-section {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 60px;
      position: relative;
      text-align: center;
    }
    .error-bg-overlay {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1551632811-561732d1e306?w=1600&q=80&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      opacity: 0.12;
      z-index: 0;
    }
    [data-theme="dark"] .error-bg-overlay {
      opacity: 0.05;
    }
    .error-card {
      background: var(--bg-surface);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-card);
      padding: 56px 40px;
      box-shadow: var(--shadow-card);
      max-width: 580px;
      width: 100%;
      z-index: 1;
      position: relative;
    }
    .error-graphic {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(225, 112, 85, 0.1);
      color: var(--color-secondary);
      font-size: 3rem;
      animation: ringPulse 2.5s infinite;
    }
  </style>
</head>
<body>

  <!-- MINIMAL TOP BAR -->
  <div class="page-top-bar" id="page-top-bar">
    <a href="index.html" class="topbar-logo" aria-label="BAND Home">
      <svg class="logo-svg" viewBox="0 0 50 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="17" cy="20" r="13" stroke="#E17055" stroke-width="4" fill="none"/>
        <circle cx="33" cy="20" r="13" stroke="#2D3436" stroke-width="4" fill="none"/>
      </svg>
      <span class="logo-text">BAND</span>
    </a>
    <div class="topbar-utils">
      <button class="util-btn rtl-btn rtl-toggle-btn" onclick="RTLManager.toggle()">RTL</button>
      <button class="util-btn theme-toggle-btn" onclick="ThemeManager.toggle()"><i class="fa-solid fa-moon"></i></button>
    </div>
  </div>

  <main id="main-content" style="padding-top: 72px;">

    <section class="error-section" aria-label="404 Page Not Found banner">
      <div class="error-bg-overlay"></div>
      <div class="error-card container reveal">
        <div class="error-graphic" aria-hidden="true">
          <i class="fa-solid fa-compass"></i>
        </div>
        <h1 style="color:var(--color-text-primary);font-size:2.5rem;margin-bottom:12px;">Lost in the Wild?</h1>
        <p style="margin-bottom:32px;">Even the best adventurers take a wrong turn now and then. Let's get you back on track to finding your perfect active silicone ring.</p>

        <!-- Navigation Buttons -->
        <div class="flex flex-col gap-16" style="max-width:320px;margin-inline:auto;">
          <a href="index.html" class="btn btn-primary btn-full">
            <i class="fa-solid fa-house"></i> Back to Home
          </a>
          <a href="rings.html" class="btn btn-outline-dark btn-full">
            <i class="fa-solid fa-ring"></i> Shop Rings Collection
          </a>
          <a href="bundles.html" class="btn btn-outline-dark btn-full">
            <i class="fa-solid fa-box"></i> View Bundle Deals
          </a>
        </div>
      </div>
    </section>

  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
