<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Background circular gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1A3A5C" />
      <stop offset="100%" style="stop-color:#0D1B2A" />
    </radialGradient>
    
    <!-- Metallic gold gradient for borders -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3B0" />
      <stop offset="50%" style="stop-color:#D4A843" />
      <stop offset="100%" style="stop-color:#B8922E" />
    </linearGradient>

    <!-- Glowing beam gradient -->
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF" stop-opacity="0.8" />
      <stop offset="30%" style="stop-color:#D4A843" stop-opacity="0.5" />
      <stop offset="100%" style="stop-color:#D4A843" stop-opacity="0" />
    </linearGradient>

    <!-- Cloudy/oxidized gradient (left side) -->
    <linearGradient id="cloudyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7F8C8D" />
      <stop offset="100%" style="stop-color:#566573" />
    </linearGradient>

    <!-- Restored/clear gradient (right side) -->
    <linearGradient id="clearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF" />
      <stop offset="50%" style="stop-color:#E6BC5A" />
      <stop offset="100%" style="stop-color:#D4A843" />
    </linearGradient>
  </defs>

  <!-- Outer circular frame (representing completeness and premium brand) -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="2.5" />

  <!-- Center divider (subtle glow path) -->
  <line x1="32" y1="12" x2="32" y2="52" stroke="#D4A843" stroke-width="1" stroke-dasharray="2 3" opacity="0.3"/>

  <!-- Left Side: Cloudy/Oxidized Lens (Before) -->
  <path d="M32 18 C26 18, 14 24, 12 32 C14 40, 26 46, 32 46 Z" fill="url(#cloudyGrad)" opacity="0.85" />
  <!-- Scratches/oxidation texture lines on left -->
  <path d="M16 28 L24 32" stroke="#BDC3C7" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M15 34 L21 37" stroke="#BDC3C7" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M19 25 L25 28" stroke="#BDC3C7" stroke-width="1" opacity="0.3" stroke-linecap="round"/>

  <!-- Right Side: Crystal Clear & Glowing Lens (After) -->
  <path d="M32 18 C38 18, 50 24, 52 32 C50 40, 38 46, 32 46 Z" fill="url(#clearGrad)" />
  
  <!-- Sleek Chrome Inner Ring (split concept) -->
  <path d="M12 32 C14 40, 26 46, 32 46 C38 46, 50 40, 52 32" fill="none" stroke="url(#goldGrad)" stroke-width="2" />
  <path d="M12 32 C14 24, 26 18, 32 18 C38 18, 50 24, 52 32" fill="none" stroke="url(#goldGrad)" stroke-width="2" />

  <!-- Bright Beam emanating from the clear right side -->
  <path d="M46 28 L64 20 L64 44 L46 36 Z" fill="url(#beamGrad)" opacity="0.7" />

  <!-- Restoration Sparkles (diamond stars) -->
  <g fill="#FFFFFF">
    <!-- Star 1 (Large) -->
    <path d="M50 20 L52 15 L54 20 L59 22 L54 24 L52 29 L50 24 L45 22 Z" />
    <!-- Star 2 (Small) -->
    <path d="M54 36 L55 33 L56 36 L59 37 L56 38 L55 41 L54 38 L51 37 Z" opacity="0.8" />
  </g>

  <!-- Accent center glow core -->
  <circle cx="32" cy="32" r="4" fill="#FFFFFF" />
  <circle cx="32" cy="32" r="7" fill="#E6BC5A" opacity="0.5" />
</svg>