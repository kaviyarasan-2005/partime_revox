<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon — LUME</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/dark-mode.css" />
  <link rel="stylesheet" href="assets/css/rtl.css" />
  <style>
    body { background: var(--bg-primary); min-height: 100vh; display: flex; flex-direction: column; }
    .cs-header { padding: 32px 40px; display: flex; justify-content: center; align-items: flex-start; position: absolute; top: 0; width: 100%; z-index: 10; }
    .cs-logo { display: inline-flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; }
    .cs-logo-text { font-size: 1.1rem; font-weight: 800; color: var(--color-primary); letter-spacing: 2px; }
    .cs-controls { display: flex; gap: 10px; position: absolute; top: 32px; right: 40px; }
    .cs-controls .theme-toggle,
    .cs-controls .rtl-toggle { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--color-text-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; font-weight: 600; transition: all var(--transition-fast); box-shadow: var(--shadow-sm); }
    .cs-controls .theme-toggle:hover,
    .cs-controls .rtl-toggle:hover { background: var(--color-primary); color: #fff; border-color: var(--color-primary); transform: translateY(-3px); }
    .cs-main { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; padding: 120px 20px 60px; }
    .cs-bg-shape { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; z-index: 0; }
    .cs-bg-1 { width: 50vw; height: 50vw; background: var(--color-primary); top: -20%; left: -10%; }
    .cs-bg-2 { width: 40vw; height: 40vw; background: var(--color-secondary); bottom: -10%; right: -10%; }
    .cs-content { position: relative; z-index: 1; max-width: 600px; text-align: center; }
    .cs-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 999px; background: rgba(212,168,67,0.15); color: var(--color-secondary); font-size: var(--font-size-sm); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 24px; }
    .cs-title { font-size: 3rem; font-weight: 800; margin-bottom: 20px; line-height: 1.1; }
    .cs-desc { font-size: 1.125rem; color: var(--color-text-secondary); margin-bottom: 40px; line-height: 1.6; }
    .countdown { display: flex; justify-content: center; gap: 24px; margin-bottom: 48px; }
    .countdown-unit { display: flex; flex-direction: column; align-items: center; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--border-radius-md); padding: 16px 20px; min-width: 100px; box-shadow: var(--shadow-sm); }
    .countdown-num { font-size: 2.5rem; font-weight: 800; color: var(--color-primary); line-height: 1; margin-bottom: 4px; font-variant-numeric: tabular-nums; }
    .countdown-label { font-size: var(--font-size-xs); font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .05em; }
    .notify-form { display: flex; gap: 12px; max-width: 440px; margin: 0 auto; position: relative; }
    .notify-form .form-input { padding-inline-start: 44px; border-radius: 999px; }
    .notify-form .btn { border-radius: 999px; white-space: nowrap; }
    .notify-icon { position: absolute; top: 50%; transform: translateY(-50%); inset-inline-start: 18px; color: var(--color-text-muted); }
    .cs-footer { padding: 32px; text-align: center; border-top: 1px solid var(--border-color); }
    .cs-social { display: flex; justify-content: center; gap: 16px; margin-bottom: 16px; }
    .cs-social a { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; color: var(--color-text-secondary); transition: all var(--transition-fast); }
    .cs-social a:hover { background: var(--color-primary); color: #fff; border-color: var(--color-primary); transform: translateY(-3px); }
    @media (max-width: 639px) { .cs-title { font-size: 2.2rem; } .countdown { gap: 12px; } .countdown-unit { min-width: 70px; padding: 12px; } .countdown-num { font-size: 1.8rem; } .notify-form { flex-direction: column; } .notify-form .btn { width: 100%; } .cs-header { padding: 20px; } .cs-controls { top: 20px; right: 20px; } }
  </style>
</head>
<body>

  <header class="cs-header">
    <a href="index.html" class="cs-logo" aria-label="LUME Homepage">
      <img src="assets/images/logo.svg" alt="LUME Logo" height="48" />
      <span class="cs-logo-text">LUME</span>
    </a>
    <div class="cs-controls">
      <button class="theme-toggle" aria-label="Toggle dark mode" title="Toggle theme" id="theme-btn">
        <i class="fa-solid fa-moon" aria-hidden="true"></i>
      </button>
      <button class="rtl-toggle" aria-label="Switch text direction" title="Switch direction" id="rtl-btn"></button>
    </div>
  </header>

  <main class="cs-main">
    <div class="cs-bg-shape cs-bg-1"></div>
    <div class="cs-bg-shape cs-bg-2"></div>
    
    <div class="cs-content reveal">
      <div class="cs-badge"><i class="fa-solid fa-rocket"></i> Coming Soon</div>
      <h1 class="cs-title">We're Preparing Something Clearer</h1>
      <p class="cs-desc">Our new digital experience is under construction. We're building a better way to book, manage, and track your mobile headlight restoration services.</p>
      
      <div class="countdown" id="countdown-timer" aria-label="Time until launch">
        <!-- Injected via animations.js -->
      </div>

      <form class="notify-form" data-validate action="#" novalidate onsubmit="event.preventDefault(); document.getElementById('notify-success').style.display='block';">
        <i class="fa-solid fa-envelope notify-icon" aria-hidden="true"></i>
        <input type="email" class="form-input" placeholder="Enter your email address" required aria-label="Email address for notification" />
        <button type="submit" class="btn btn-primary">Notify Me</button>
      </form>
      <p id="notify-success" style="display:none;color:var(--color-success);font-size:var(--font-size-sm);margin-top:16px;">
        <i class="fa-solid fa-circle-check"></i> You're on the list! We'll notify you when we launch.
      </p>
      
    </div>
  </main>

  <script src="assets/js/theme.js"></script>
  <script src="assets/js/rtl.js"></script>
  <script src="assets/js/animations.js"></script>
</body>
</html>
