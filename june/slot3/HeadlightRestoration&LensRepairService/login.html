<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — LUME</title>
  <meta name="description" content="Sign in to your LUME account to view service history, warranty certificates, and book new services." />
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/dark-mode.css" />
  <link rel="stylesheet" href="assets/css/rtl.css" />
  <style>
    /* Auth layout */
    .auth-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--bg-secondary); padding: 40px 20px;
    }
    .auth-card {
      width: 100%; max-width: 460px; background: var(--bg-card);
      border-radius: var(--border-radius-lg); border: 1px solid var(--border-color);
      box-shadow: var(--shadow-card); padding: 48px; position: relative; overflow: hidden;
    }
    .auth-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
    }
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-logo { display: inline-flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 24px; text-decoration: none; }
    .auth-title { font-size: 1.5rem; margin-bottom: 8px; }
    .auth-subtitle { font-size: var(--font-size-sm); color: var(--color-text-secondary); }
    .auth-footer { margin-top: 32px; text-align: center; font-size: var(--font-size-sm); color: var(--color-text-secondary); }
    .auth-footer a { color: var(--color-primary); font-weight: 600; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    .auth-divider {
      display: flex; align-items: center; margin: 24px 0;
      font-size: var(--font-size-xs); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .05em;
    }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border-color); }
    .auth-divider::before { margin-inline-end: 16px; }
    .auth-divider::after { margin-inline-start: 16px; }
    .social-auth-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 12px; border-radius: var(--border-radius); border: 1px solid var(--border-color);
      background: var(--bg-primary); color: var(--color-text-primary);
      font-size: var(--font-size-sm); font-weight: 500; cursor: pointer;
      transition: background var(--transition-fast);
    }
    .social-auth-btn:hover { background: var(--bg-secondary); }
    .auth-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: var(--font-size-sm); }
    .input-password-wrap { position: relative; }
    .password-toggle {
      position: absolute; top: 50%; inset-inline-end: 16px; transform: translateY(-50%);
      background: none; border: none; color: var(--color-text-muted); cursor: pointer; padding: 0;
    }
    .password-toggle:hover { color: var(--color-text-primary); }
    /* Back to home */
    .back-to-home { position: absolute; top: 24px; inset-inline-start: 24px; color: var(--color-text-secondary); text-decoration: none; font-size: var(--font-size-sm); font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .back-to-home:hover { color: var(--color-primary); }
    .auth-toggle-btn {
      width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border-color);
      background: var(--bg-card); color: var(--color-text-primary); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 0.875rem; font-weight: 600;
      transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .auth-toggle-btn:hover { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
    @media (max-width: 639px) {
      .auth-card { padding: 32px 24px; }
      .back-to-home { top: 16px; inset-inline-start: 16px; }
    }
  </style>
</head>
<body class="auth-page">

  <div style="position:fixed;top:24px;right:24px;display:flex;gap:12px;z-index:100;">
    <button id="theme-toggle" class="auth-toggle-btn theme-toggle" aria-label="Toggle dark mode">
      <i class="fa-solid fa-moon"></i>
    </button>
    <button id="rtl-toggle" class="auth-toggle-btn rtl-toggle" aria-label="Toggle RTL">
      RTL
    </button>
  </div>

  <main class="auth-card reveal">
    <div class="auth-header">
      <a href="index.html" class="auth-logo" aria-label="LUME Homepage">
        <img src="assets/images/logo.svg" alt="LUME Logo" height="48" />
        <span style="font-size:1.5rem;font-weight:800;color:var(--color-primary);letter-spacing:0.05em;">LUME</span>
      </a>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your account to continue</p>
    </div>

    <form action="dashboard-user.html" method="GET" data-validate aria-label="Sign in form">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div style="position:relative;">
          <i class="fa-solid fa-envelope" style="position:absolute;top:50%;transform:translateY(-50%);inset-inline-start:16px;color:var(--color-text-muted);"></i>
          <input type="email" id="email" class="form-input" placeholder="name@example.com" style="padding-inline-start:44px;" required autocomplete="email" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-password-wrap">
          <i class="fa-solid fa-lock" style="position:absolute;top:50%;transform:translateY(-50%);inset-inline-start:16px;color:var(--color-text-muted);z-index:1;"></i>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password" />
          <button type="button" class="password-toggle" aria-label="Toggle password visibility"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>

      <div class="auth-options">
        <label class="checkbox-label">
          <input type="checkbox" id="remember" />
          <span>Remember me</span>
        </label>
        <a href="forgot-password.html" style="color:var(--color-primary);font-weight:500;text-decoration:none;">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-full">Sign In <i class="fa-solid fa-arrow-right-to-bracket" style="margin-inline-start:8px;"></i></button>
    </form>

    <div class="auth-divider">Or continue with</div>

    <div style="display:flex;gap:12px;flex-direction:column;">
      <button class="social-auth-btn" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
      </button>
      <button class="social-auth-btn" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        Sign in with Apple
      </button>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
  </main>

  <script src="assets/js/theme.js"></script>
  <script src="assets/js/rtl.js"></script>
  <script src="assets/js/animations.js"></script>

</body>
</html>
