<!DOCTYPE html>
<html lang="en" class="dark" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon | AquaShine Marine</title>
  <meta name="description" content="We're launching our new instant online detailing scheduler. Sign up to get notified and receive an exclusive launch discount." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="tailwind-config.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body>
<div class="page-wrapper auth-page relative overflow-hidden">
  
  <!-- Sunset Marina background -->
  <div class="auth-bg" style="background-image:url('assets/images/coming-soon-hero.png')"></div>
  <div class="auth-overlay"></div>

  <!-- Countdown Target Anchor (Sets countdown to December 31, 2026) -->
  <div id="countdown-target" data-target="2026-12-31T00:00:00" class="hidden"></div>

  <!-- Main glass card -->
  <div class="auth-card text-center max-w-xl" style="max-width:560px">
    
    <!-- Logo -->
    <a href="index.html" class="inline-flex items-center gap-3 mb-8">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-accent" style="background-color:var(--c-accent)">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="22" height="22" style="display:inline-block;vertical-align:middle"><g transform="translate(20,20)" fill="none" stroke="#008080" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="0" cy="-9" r="3.2" fill="#008080" stroke="none"/><line x1="0" y1="-6" x2="0" y2="8"/><line x1="-6" y1="-1" x2="6" y2="-1"/><path d="M-8,8 Q-5,4 0,8 Q5,12 8,8"/><path d="M-10,13 Q-6,10 -2,13 Q2,16 6,13 Q9,10 10,13" stroke-width="2" opacity="0.55"/></g></svg>
      </div>
      <div class="leading-tight text-left">
        <div class="font-bold text-xl text-white font-outfit">AquaShine</div>
        <div class="text-xs font-semibold tracking-widest uppercase" style="color:var(--c-accent)">Marine</div>
      </div>
    </a>

    <!-- Heading -->
    <h1 class="font-outfit font-black text-3xl text-white mb-2 leading-tight">We're Launching Our New Booking System</h1>
    <p class="text-sm text-white/70 mb-8 max-w-md mx-auto">
      Our instant online scheduling panel is almost ready. Book certified mobile detailing dock-side in less than 60 seconds.
    </p>

    <!-- Countdown Timer Grid -->
    <div class="grid grid-cols-4 gap-3 mb-8">
      <div class="countdown-box">
        <span id="cd-days" class="countdown-num">00</span>
        <span class="countdown-label">Days</span>
      </div>
      <div class="countdown-box">
        <span id="cd-hours" class="countdown-num">00</span>
        <span class="countdown-label">Hours</span>
      </div>
      <div class="countdown-box">
        <span id="cd-minutes" class="countdown-num">00</span>
        <span class="countdown-label">Mins</span>
      </div>
      <div class="countdown-box">
        <span id="cd-seconds" class="countdown-num">00</span>
        <span class="countdown-label">Secs</span>
      </div>
    </div>

    <!-- Signup Form -->
    <form data-mock-form class="space-y-4 mb-8">
      <div class="flex flex-col sm:flex-row gap-2">
        <input type="email" required placeholder="Enter your email address" class="form-control" style="border-radius:999px;padding:12px 20px" />
        <button type="submit" class="btn btn-accent" style="border-radius:999px"><i class="fas fa-bell"></i> Notify Me</button>
      </div>
      <p class="text-[10px] text-white/50">Subscribe now to get a 10% discount on your first detailing service.</p>
    </form>

    <!-- Social links & Nav -->
    <div class="flex justify-between items-center pt-6 border-t border-white/10">
      <div class="flex gap-2">
        <a href="#" class="social-icon social-facebook" style="width:32px;height:32px" aria-label="Facebook"><i class="fab fa-facebook-f text-xs"></i></a>
        <a href="#" class="social-icon social-instagram" style="width:32px;height:32px" aria-label="Instagram"><i class="fab fa-instagram text-xs"></i></a>
        <a href="#" class="social-icon social-twitter" style="width:32px;height:32px" aria-label="Twitter"><i class="fab fa-twitter text-xs"></i></a>
      </div>
      <div class="flex gap-2">
        <button id="rtl-toggle" class="icon-btn" style="width:32px;height:32px">RTL</button>
        <button id="theme-toggle" class="icon-btn" style="width:32px;height:32px"><i class="fas fa-moon text-xs" id="theme-icon"></i></button>
      </div>
    </div>

  </div>

</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<script src="main.js"></script>
</body>
</html>
