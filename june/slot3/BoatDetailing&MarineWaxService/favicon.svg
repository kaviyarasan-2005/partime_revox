<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F6BE96"/>
      <stop offset="100%" style="stop-color:#E8944A"/>
    </linearGradient>
  </defs>
  <!-- Rounded square -->
  <rect width="512" height="512" rx="115" fill="url(#favGrad)"/>
  <!-- Custom anchor-wave mark -->
  <g transform="translate(256,245)" fill="none" stroke="#008080" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- Anchor ring -->
    <circle cx="0" cy="-115" r="38" fill="#008080" stroke="none"/>
    <!-- Shaft -->
    <line x1="0" y1="-77" x2="0" y2="100"/>
    <!-- Crossbar -->
    <line x1="-75" y1="-12" x2="75" y2="-12"/>
    <!-- Wave flukes -->
    <path d="M-102,100 Q-55,50 0,100 Q55,150 102,100" fill="none"/>
    <!-- Water wave -->
    <path d="M-125,165 Q-75,130 -25,165 Q25,200 75,165 Q112,138 125,165" stroke-width="22" opacity="0.55"/>
  </g>
</svg>
