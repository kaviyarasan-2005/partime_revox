<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F6BE96"/>
      <stop offset="100%" style="stop-color:#E8944A"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="40" height="40" rx="10" fill="url(#logoGrad)"/>
  <!-- Custom anchor-wave mark -->
  <g transform="translate(20,20)" fill="none" stroke="#008080" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Anchor ring (top) -->
    <circle cx="0" cy="-9" r="3" fill="#008080" stroke="none"/>
    <!-- Anchor shaft -->
    <line x1="0" y1="-6" x2="0" y2="8"/>
    <!-- Anchor crossbar -->
    <line x1="-6" y1="-1" x2="6" y2="-1"/>
    <!-- Anchor flukes as waves -->
    <path d="M-8,8 Q-5,4 0,8 Q5,12 8,8" fill="none"/>
    <!-- Water wave beneath -->
    <path d="M-10,13 Q-6,10 -2,13 Q2,16 6,13 Q9,10 10,13" stroke-width="1.8" opacity="0.6"/>
  </g>
</svg>
