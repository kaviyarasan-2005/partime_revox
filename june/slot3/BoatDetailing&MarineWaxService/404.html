<!DOCTYPE html>
<html lang="en" class="dark" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | AquaShine Marine</title>
  <meta name="description" content="Lost at sea? The page you requested could not be found. Navigate back to harbor." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="tailwind-config.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    /* Add smooth keyframe rotation to the anchor for extra polish */
    @keyframes slow-spin {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(20deg); }
      100% { transform: rotate(0deg); }
    }
    .floating-anchor {
      animation: slow-spin 6s ease-in-out infinite;
    }
  </style>
</head>
<body>
<div class="page-wrapper error-page relative overflow-hidden">

  <!-- Background overlay 404 number -->
  <div class="error-code">404</div>

  <!-- Content Container -->
  <div class="relative z-10 max-w-lg mx-auto px-4 flex flex-col items-center">
    
    <!-- Logo -->
    <div class="flex justify-center mb-8">
      <a href="index.html" class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-accent" style="background-color:var(--c-accent)"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="22" height="22" style="display:inline-block;vertical-align:middle"><g transform="translate(20,20)" fill="none" stroke="#008080" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="0" cy="-9" r="3.2" fill="#008080" stroke="none"/><line x1="0" y1="-6" x2="0" y2="8"/><line x1="-6" y1="-1" x2="6" y2="-1"/><path d="M-8,8 Q-5,4 0,8 Q5,12 8,8"/><path d="M-10,13 Q-6,10 -2,13 Q2,16 6,13 Q9,10 10,13" stroke-width="2" opacity="0.55"/></g></svg></div>
        <div class="leading-tight text-left"><div class="font-bold text-xl text-white font-outfit">AquaShine</div><div class="text-xs font-semibold tracking-widest uppercase" style="color:var(--c-accent)">Marine</div></div>
      </a>
    </div>
    
    <!-- Icon Circle -->
    <div class="w-24 h-24 rounded-full flex items-center justify-center mb-8 shadow-xl" style="background-color:rgba(209, 213, 219,0.12); border: 2px solid rgba(209, 213, 219,0.25)">
      <i class="fas fa-anchor text-5xl floating-anchor" style="color:var(--c-accent)"></i>
    </div>

    <!-- Error Messages -->
    <h1 class="font-outfit font-black text-4xl mb-4" style="color:var(--text-primary)">Lost at Sea?</h1>
    <p class="text-base mb-8 leading-relaxed" style="color:var(--text-muted)">
      The page you are looking for has drifted off course, sunk, or never existed in our manifest. Let's get you back to safe harbor.
    </p>

    <!-- Quick Navigation Links -->
    <div class="flex flex-col sm:flex-row gap-3 w-full justify-center mb-8">
      <a href="index.html" class="btn btn-primary justify-center"><i class="fas fa-ship"></i> Return to Harbor</a>
      <a href="services.html" class="btn btn-outline justify-center"><i class="fas fa-tools"></i> View Services</a>
    </div>

    <!-- Minimal Utilities -->
    <div class="flex gap-4 items-center">
      <button id="rtl-toggle" class="icon-btn" style="background:var(--bg-card);border-color:var(--border)">RTL</button>
      <button id="theme-toggle" class="icon-btn" style="background:var(--bg-card);border-color:var(--border)"><i class="fas fa-moon" id="theme-icon" style="color:var(--text-primary)"></i></button>
      <a href="contact.html" class="text-sm font-semibold hover:underline" style="color:var(--c-accent)">Report issue</a>
    </div>

  </div>

  <!-- Floating wave visual at bottom -->
  <div class="absolute bottom-0 left-0 right-0 h-24 opacity-10" style="background-image: radial-gradient(circle, var(--c-accent) 0%, transparent 80%); pointer-events: none;"></div>

</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<script src="main.js"></script>
</body>
</html>
