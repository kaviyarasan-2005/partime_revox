<!DOCTYPE html>
<html lang="en" class="dark" dir="ltr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | AquaShine Marine</title>
  <meta name="description" content="Sign in to your AquaShine Marine client account to manage bookings, view service history, and access exclusive offers." />
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script><script src="tailwind-config.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    .auth-input-group { position:relative; }
    .auth-input-group .icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-light); font-size:0.875rem; pointer-events:none; }
    .auth-input-group input { padding-left:42px; }
    .pw-toggle { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-light); cursor:pointer; font-size:0.875rem; }
    .pw-toggle:hover { color:var(--c-accent); }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-bg" style="background-image:url('assets/images/Hull Polishing.png')"></div>
  <div class="auth-overlay"></div>

  <!-- Theme Toggle (floating) -->
  <div style="position:fixed;top:20px;right:20px;z-index:100;display:flex;gap:10px">
    <button id="rtl-toggle" class="icon-btn" title="Toggle RTL/LTR">RTL</button>
    <button id="theme-toggle" class="icon-btn"><i class="fas fa-moon" id="theme-icon"></i></button>
  </div>

  <div class="auth-card">
    <div class="flex justify-center mb-6">
      <a href="index.html" class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-accent" style="background-color:var(--c-accent)"><i class="fas fa-anchor text-lg" style="color:var(--c-primary)"></i></div>
        <div class="leading-tight text-left"><div class="font-bold text-xl font-outfit" style="color:var(--text-primary)">AquaShine</div><div class="text-xs font-semibold tracking-widest uppercase" style="color:var(--c-accent)">Marine</div></div>
      </a>
    </div>
    <h2 class="font-outfit font-bold text-center mb-1" style="font-size:1.6rem;color:var(--text-primary)">Welcome Back</h2>
    <p class="text-center text-sm mb-8" style="color:var(--text-muted)">Sign in to your client account</p>

    <form data-auth-form="login" class="space-y-4">
      <div class="form-group">
        <label class="form-label" style="color:var(--text-secondary)" for="login-email">Email Address</label>
        <div class="auth-input-group">
          <i class="fas fa-envelope icon"></i>
          <input type="email" id="login-email" class="form-control" placeholder="you@example.com" required />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" style="color:var(--text-secondary)" for="login-password">Password</label>
        <div class="auth-input-group" style="position:relative">
          <i class="fas fa-lock icon"></i>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required />
          <button type="button" class="pw-toggle" onclick="const p=this.previousElementSibling;p.type=p.type==='password'?'text':'password';this.querySelector('i').className=p.type==='password'?'fas fa-eye':'fas fa-eye-slash'"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <div class="flex justify-between items-center">
        <label class="flex items-center gap-2 text-sm" style="color:var(--text-muted);cursor:pointer">
          <input type="checkbox" class="custom-checkbox" /> Remember me
        </label>
        <a href="#" class="text-sm font-semibold" style="color:var(--c-accent)">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-accent w-full justify-center hover-glow" style="padding:13px;margin-top:8px">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div class="flex items-center gap-4 my-6">
      <div class="flex-1 h-px" style="background:var(--border)"></div>
      <span class="text-xs" style="color:var(--text-light)">or continue with</span>
      <div class="flex-1 h-px" style="background:var(--border)"></div>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <button class="btn btn-google justify-center" onclick="showToast('Google sign-in coming soon!','info')">
        <i class="fab fa-google"></i> Google
      </button>
      <button class="btn btn-apple justify-center" onclick="showToast('Apple sign-in coming soon!','info')">
        <i class="fab fa-apple"></i> Apple
      </button>
    </div>

    <p class="text-center text-sm mt-6" style="color:var(--text-muted)">
      Don't have an account? <a href="register.html" class="font-semibold" style="color:var(--c-accent)">Sign Up Free</a>
    </p>
  </div>
</div>
<div id="toast-container"></div>
<script src="main.js"></script>
</body>
</html>
