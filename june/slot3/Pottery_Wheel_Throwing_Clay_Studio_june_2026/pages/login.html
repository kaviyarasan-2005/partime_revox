<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KILN | Log In</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  
  <!-- Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: url('../assets/images/avatar-placeholder.png');
      background-size: cover;
      background-position: center;
      position: relative;
    }
    
    .bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(26,24,22,0.6);
      backdrop-filter: blur(8px);
      z-index: 0;
    }
    
    .auth-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 0 var(--space-4);
    }
    @media (min-width: 640px) { .auth-container { padding: 0 var(--space-6); } }
    @media (min-width: 1024px) { .auth-container { padding: 0 var(--space-8); } }
    
    .auth-card {
      background: var(--surface-color);
      border-radius: 12px;
      padding: var(--space-8) var(--space-6);
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
      width: 100%;
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 40px);
      overflow-y: auto; /* Just in case on very small screens, though prompt asks for no scroll */
    }
    
    /* Strict no scroll enforcement via hiding overflow if it does overflow, 
       but for accessibility it's risky if the screen is too small. 
       We will keep it compact to fit within most viewports. */
    .auth-card::-webkit-scrollbar { display: none; }
    .auth-card { -ms-overflow-style: none; scrollbar-width: none; }
    
    .auth-brand {
      font-family: var(--font-heading);
      font-size: var(--text-4xl);
      font-weight: 700;
      color: var(--text-heading);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-6);
      letter-spacing: 2px;
      text-decoration: none;
    }
    
    .auth-form .form-group {
      margin-bottom: var(--space-4);
    }
    
    .auth-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: var(--text-sm);
      margin-bottom: var(--space-6);
    }
    
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      color: var(--text-secondary);
    }
    
    .auth-divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: var(--space-6) 0;
      color: var(--neutral-400);
      font-size: var(--text-sm);
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }
    .auth-divider:not(:empty)::before { margin-right: .25em; }
    .auth-divider:not(:empty)::after { margin-left: .25em; }
    
    .social-auth {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    
    .btn-social-auth {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: var(--space-3) var(--space-6);
      border-radius: 6px;
      font-weight: 500;
      font-size: var(--text-sm);
      transition: opacity 200ms ease;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .btn-social-auth:hover { opacity: 0.9; }
    
    .btn-social-content {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      width: 220px;
      text-align: left;
    }
    
    .btn-social-icon-wrapper {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .btn-google {
      background-color: var(--surface-color);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }
    [data-theme="dark"] .btn-google {
      background-color: var(--elevated-color);
      color: var(--text-primary);
      border-color: var(--border-color);
    }
    .btn-facebook {
      background-color: var(--surface-color);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }
    [data-theme="dark"] .btn-facebook {
      background-color: var(--elevated-color);
      color: var(--text-primary);
      border-color: var(--border-color);
    }
    .btn-apple { background-color: #000000; color: #ffffff; }
    [data-theme="dark"] .btn-apple { background-color: #FFFFFF; color: #000000; }
    
    .auth-footer {
      text-align: center;
      margin-top: var(--space-6);
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }
    
    .auth-toggles {
      position: absolute;
      top: var(--space-4);
      right: var(--space-4);
      display: flex;
      gap: var(--space-2);
      z-index: 10;
    }
    [dir="rtl"] .auth-toggles {
      right: auto;
      left: var(--space-4);
    }
    
    .theme-toggle-auth {
      color: #F9F7F4;
      background: rgba(0,0,0,0.2);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 200ms ease;
      border: 1px solid rgba(249, 247, 244, 0.2);
      cursor: pointer;
    }
    .theme-toggle-auth:hover { background: rgba(0,0,0,0.4); }
  </style>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../favicon.png">
</head>
<body>

  <div class="bg-overlay"></div>
  
  <div class="auth-toggles">
    <button class="theme-toggle theme-toggle-auth" aria-label="Toggle Theme">
      <i class="ph ph-sun"></i>
    </button>
    <button class="rtl-toggle theme-toggle-auth" style="font-size: 12px; font-weight: 600; padding: 0;" aria-label="Toggle RTL">RTL</button>
  </div>

  <div class="auth-container fade-in-up visible">
    <div class="auth-card">
      <a href="index.html" class="auth-brand"><img src="../assets/images/logo.png" alt="KILN Logo" class="nav-logo">KILN</a>
      
      <form class="auth-form" action="user-dashboard.html">
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
        </div>
        
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        
        <div class="auth-options">
          <label class="checkbox-group">
            <input type="checkbox"> Remember Me
          </label>
          <a href="#" class="text-primary hover:underline">Forgot Password?</a>
        </div>
        
        <button type="submit" class="btn btn-primary w-full">Log In</button>
      </form>
      
      <div class="auth-divider">OR</div>
      
      <div class="social-auth">
        <button type="button" class="btn-social-auth btn-google">
          <span class="btn-social-content">
            <span class="btn-social-icon-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" style="flex-shrink: 0;">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
              </svg>
            </span>
            <span>Continue with Google</span>
          </span>
        </button>
        <button type="button" class="btn-social-auth btn-apple">
          <span class="btn-social-content">
            <span class="btn-social-icon-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="flex-shrink: 0;">
                <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.15.67-2.87 1.51-.62.71-1.16 1.85-1.01 2.96 1.1.09 2.23-.6 2.89-1.41z"/>
              </svg>
            </span>
            <span>Continue with Apple</span>
          </span>
        </button>
        <button type="button" class="btn-social-auth btn-facebook">
          <span class="btn-social-content">
            <span class="btn-social-icon-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" style="flex-shrink: 0;">
                <circle cx="12" cy="12" r="12" fill="#1877F2"/>
                <path fill="#FFFFFF" d="M14 9h-3V7c0-.55.45-1 1-1h2V3h-3c-2.2 0-4 1.8-4 4v2H5v3h2v8h4v-8h3l1-3z"/>
              </svg>
            </span>
            <span>Continue with Facebook</span>
          </span>
        </button>
      </div>
      
      <div class="auth-footer">
        Don't have an account? <a href="signup.html" class="text-primary font-medium">Sign Up</a>
      </div>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
</body>
</html>
