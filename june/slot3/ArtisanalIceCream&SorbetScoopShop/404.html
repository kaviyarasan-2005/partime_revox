<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — NOVA</title>
  <meta name="description" content="Oops! This page seems to have melted away. Head back to our homepage to explore our artisanal collection." />
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/luxury-components.css" />
  <link rel="stylesheet" href="assets/css/dark-mode.css" />
  <link rel="stylesheet" href="assets/css/rtl.css" />
  <style>
    body { min-height: 100vh; overflow: hidden; }
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      text-align: center;
    }
    .error-bg { position: fixed; inset: 0; z-index: 0; }
    .error-bg img { width: 100%; height: 100%; object-fit: cover; filter: blur(2px) scale(1.04); }
    .error-overlay { position: fixed; inset: 0; z-index: 1; background-color: rgba(250,246,240,0.82); }
    [data-theme="dark"] .error-overlay { background-color: rgba(20,10,6,0.88); }
    .error-content { position: relative; z-index: 2; padding: 40px 24px; max-width: 580px; width: 100%; }
    .error-logo { display: inline-block; text-decoration: none; margin-bottom: 40px; }
    .error-logo img { height: 80px; width: auto; }
    .error-code { font-family: var(--font-heading); font-size: clamp(6rem, 16vw, 10rem); font-weight: 700; line-height: 1; color: var(--color-primary); opacity: .12; margin: 0; letter-spacing: -.04em; position: absolute; inset-inline-start: 50%; transform: translateX(-50%); top: 50%; transform: translate(-50%, -50%); pointer-events: none; white-space: nowrap; }
    .error-icon-wrap { position: relative; margin-bottom: 28px; }
    .error-icon { font-size: 4rem; color: var(--color-primary); opacity: .25; }
    .error-title { font-family: var(--font-heading); font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 700; margin-bottom: 14px; color: var(--color-text-primary); }
    .error-subtitle { font-size: 1rem; color: var(--color-text-secondary); line-height: 1.7; margin-bottom: 36px; max-width: 420px; margin-inline: auto; }
    .error-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; margin-bottom: 40px; }
    .error-nav-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
    .error-nav-link { display: flex; align-items: center; gap: 7px; padding: 8px 16px; border: 1.5px solid var(--color-border); border-radius: var(--radius-sm); font-size: .82rem; font-weight: 600; color: var(--color-text-secondary); text-decoration: none; transition: border-color .2s, color .2s; }
    .error-nav-link:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .error-utils { position: fixed; top: 16px; inset-inline-end: 16px; display: flex; gap: 8px; z-index: 10; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .floating-icon { animation: float 3s ease-in-out infinite; display: inline-block; }
  </style>
  <script src="assets/js/theme.js"></script><script src="assets/js/rtl.js"></script>
</head>
<body>
<div class="error-utils">
  <button class="util-btn rtl-btn" data-rtl-toggle aria-label="Toggle RTL">RTL</button>
  <button class="util-btn" data-theme-toggle aria-label="Toggle theme" id="error-theme-btn"><i class="fa-solid fa-moon" aria-hidden="true"></i></button>
</div>

<div class="error-page" role="main">
  <!-- Background -->
  <div class="error-bg" aria-hidden="true">
    <img src="https://images.unsplash.com/photo-1488477181946-6428a0291777?w=1600&q=85&auto=format&fit=crop" alt="" />
  </div>
  <div class="error-overlay" aria-hidden="true"></div>

  <div class="error-content">
    <a href="index.html" class="error-logo" aria-label="NOVA — Return home"><img src="assets/images/logo.svg" alt="NOVA" /></a>

    <!-- Floating ice cream icon -->
    <div class="error-icon-wrap" aria-hidden="true">
      <div class="floating-icon" style="font-size:5.5rem;color:var(--color-primary);opacity:.2;">
        <i class="fa-solid fa-ice-cream"></i>
      </div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.5rem;color:var(--color-primary);">
        <strong>404</strong>
      </div>
    </div>

    <h1 class="error-title">It Seems This Scoop Melted Away</h1>
    <p class="error-subtitle">The page you're looking for has either been moved, renamed, or — like our limited-edition flavours — is simply no longer available.</p>

    <div class="error-actions">
      <a href="index.html" class="btn btn-primary btn-lg" id="error-home-btn">
        <i class="fa-solid fa-house" aria-hidden="true"></i> Back to Home
      </a>
      <a href="flavors.html" class="btn btn-outline-primary btn-lg" id="error-flavors-btn">
        <i class="fa-solid fa-ice-cream" aria-hidden="true"></i> View Flavors
      </a>
    </div>

    <p style="font-size:.8rem;color:var(--color-text-secondary);margin-bottom:14px;">Or explore these pages:</p>
    <nav class="error-nav-links" aria-label="Suggested pages">
      <a href="home-catering.html" class="error-nav-link" id="err-catering">
        <i class="fa-solid fa-champagne-glasses" aria-hidden="true"></i> Catering
      </a>
      <a href="services.html" class="error-nav-link" id="err-services">
        <i class="fa-solid fa-concierge-bell" aria-hidden="true"></i> Services
      </a>
      <a href="blog.html" class="error-nav-link" id="err-blog">
        <i class="fa-solid fa-book-open" aria-hidden="true"></i> Blog
      </a>
      <a href="about.html" class="error-nav-link" id="err-about">
        <i class="fa-solid fa-circle-info" aria-hidden="true"></i> About Us
      </a>
      <a href="contact.html" class="error-nav-link" id="err-contact">
        <i class="fa-solid fa-envelope" aria-hidden="true"></i> Contact
      </a>
    </nav>
  </div>
</div>

<script src="assets/js/main.js"></script>
</body>
</html>
