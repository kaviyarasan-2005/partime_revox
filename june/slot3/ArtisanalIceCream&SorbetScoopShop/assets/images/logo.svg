<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <!-- Waffle Cone -->
  <polygon points="100,270 60,140 140,140" fill="#C49A6C" stroke="#1B2A4A" stroke-width="3"/>
  
  <!-- Cone Waffle Pattern -->
  <line x1="72" y1="160" x2="107" y2="250" stroke="#A67C52" stroke-width="1.5"/>
  <line x1="85" y1="150" x2="112" y2="250" stroke="#A67C52" stroke-width="1.5"/>
  <line x1="100" y1="145" x2="100" y2="260" stroke="#A67C52" stroke-width="1.5"/>
  <line x1="115" y1="150" x2="88" y2="250" stroke="#A67C52" stroke-width="1.5"/>
  <line x1="128" y1="160" x2="93" y2="250" stroke="#A67C52" stroke-width="1.5"/>
  
  <!-- Cross Waffle Pattern -->
  <line x1="65" y1="180" x2="135" y2="170" stroke="#A67C52" stroke-width="1.5"/>
  <line x1="68" y1="200" x2="132" y2="190" stroke="#A67C52" stroke-width="1.5"/>
  <line x1="72" y1="220" x2="128" y2="210" stroke="#A67C52" stroke-width="1.5"/>
  <line x1="76" y1="240" x2="124" y2="230" stroke="#A67C52" stroke-width="1.5"/>

  <!-- Bottom Scoop (Cream/Vanilla) -->
  <circle cx="100" cy="120" r="48" fill="#F5E6C8" stroke="#1B2A4A" stroke-width="3"/>
  
  <!-- Left Scoop (Pink/Strawberry) -->
  <circle cx="65" cy="95" r="45" fill="#E8829A" stroke="#1B2A4A" stroke-width="3"/>
  
  <!-- Right Scoop (Cream/Vanilla) -->
  <circle cx="135" cy="95" r="45" fill="#F5E6C8" stroke="#1B2A4A" stroke-width="3"/>
  
  <!-- Top Scoop (light cream) -->
  <circle cx="100" cy="70" r="40" fill="#FDF5E6" stroke="#1B2A4A" stroke-width="3"/>

  <!-- Leaf -->
  <ellipse cx="85" cy="30" rx="12" ry="22" fill="#2D8B57" stroke="#1B2A4A" stroke-width="2" transform="rotate(-20, 85, 30)"/>
  <line x1="85" y1="12" x2="85" y2="48" stroke="#1B2A4A" stroke-width="1.5"/>
</svg>
