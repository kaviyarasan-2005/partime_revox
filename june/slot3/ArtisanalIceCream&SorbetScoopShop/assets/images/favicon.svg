<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Waffle Cone -->
  <polygon points="50,95 35,55 65,55" fill="#C49A6C" stroke="#1B2A4A" stroke-width="2"/>
  
  <!-- Cone Waffle Lines -->
  <line x1="42" y1="60" x2="53" y2="88" stroke="#A67C52" stroke-width="1"/>
  <line x1="50" y1="57" x2="50" y2="90" stroke="#A67C52" stroke-width="1"/>
  <line x1="58" y1="60" x2="48" y2="88" stroke="#A67C52" stroke-width="1"/>
  
  <!-- Bottom Scoop (Cream) -->
  <circle cx="50" cy="48" r="16" fill="#F5E6C8" stroke="#1B2A4A" stroke-width="2"/>
  
  <!-- Left Scoop (Pink) -->
  <circle cx="38" cy="38" r="15" fill="#E8829A" stroke="#1B2A4A" stroke-width="2"/>
  
  <!-- Right Scoop (Cream) -->
  <circle cx="62" cy="38" r="15" fill="#F5E6C8" stroke="#1B2A4A" stroke-width="2"/>
  
  <!-- Top Scoop (Light) -->
  <circle cx="50" cy="28" r="13" fill="#FDF5E6" stroke="#1B2A4A" stroke-width="2"/>

  <!-- Leaf -->
  <ellipse cx="45" cy="14" rx="4" ry="8" fill="#2D8B57" stroke="#1B2A4A" stroke-width="1.5" transform="rotate(-20, 45, 14)"/>
</svg>
