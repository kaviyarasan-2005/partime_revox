<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Something New Is Coming — NOVA</title>
  <meta name="description" content="NOVA is preparing something extraordinary. Enter your email to be notified when we launch." />
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/luxury-components.css" />
  <link rel="stylesheet" href="assets/css/dark-mode.css" />
  <link rel="stylesheet" href="assets/css/rtl.css" />
  <style>
    body { min-height: 100vh; overflow: hidden; }
    .coming-soon-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .cs-bg { position: fixed; inset: 0; z-index: 0; }
    .cs-bg img { width: 100%; height: 100%; object-fit: cover; }
    .cs-overlay { position: fixed; inset: 0; z-index: 1; background-color: rgba(44,24,16,0.62); }
    .cs-content {
      position: relative;
      z-index: 2;
      text-align: center;
      color: #fff;
      padding: 40px 24px;
      max-width: 680px;
      width: 100%;
    }
    .cs-logo { margin-bottom: 32px; }
    .cs-logo img { height: 80px; width: auto; }
    .cs-eyebrow { font-size: .75rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: rgba(245,230,200,0.7); margin-bottom: 16px; }
    .cs-title { font-family: var(--font-heading); font-size: clamp(2rem, 5vw, 3.4rem); font-weight: 700; line-height: 1.15; margin-bottom: 20px; color: #fff; }
    .cs-subtitle { font-size: 1.05rem; color: rgba(250,246,240,0.75); line-height: 1.7; margin-bottom: 40px; max-width: 480px; margin-inline: auto; }
    .countdown-timer { display: flex; justify-content: center; gap: 24px; margin-bottom: 44px; }
    .countdown-unit { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .countdown-num { font-family: var(--font-heading); font-size: clamp(2.2rem, 5vw, 3.2rem); font-weight: 700; color: var(--color-secondary); line-height: 1; min-width: 70px; }
    .countdown-label { font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .12em; color: rgba(245,230,200,0.6); }
    .countdown-sep { font-family: var(--font-heading); font-size: 2rem; color: rgba(245,230,200,0.4); align-self: center; margin-bottom: 20px; }
    .cs-form { display: flex; gap: 10px; max-width: 420px; margin-inline: auto; flex-wrap: wrap; justify-content: center; }
    .cs-form .cs-input { flex: 1; min-width: 200px; height: 50px; padding: 0 16px; border: 1.5px solid rgba(245,230,200,0.4); border-radius: var(--radius-md); background: rgba(44,24,16,0.35); color: #fff; font-family: var(--font-body); font-size: .9rem; outline: none; transition: border-color .2s; }
    .cs-form .cs-input::placeholder { color: rgba(245,230,200,0.5); }
    .cs-form .cs-input:focus { border-color: var(--color-secondary); }
    .cs-privacy { font-size: .75rem; color: rgba(245,230,200,0.45); margin-top: 12px; }
    .cs-social { display: flex; gap: 12px; justify-content: center; margin-top: 36px; }
    .cs-social-link { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid rgba(245,230,200,0.3); display: flex; align-items: center; justify-content: center; color: rgba(245,230,200,0.7); font-size: .9rem; text-decoration: none; transition: border-color .2s, color .2s; }
    .cs-social-link:hover { border-color: var(--color-secondary); color: var(--color-secondary); }
    .cs-utils { position: fixed; top: 16px; inset-inline-end: 16px; display: flex; gap: 8px; z-index: 10; }
    .cs-util-btn { border: 1.5px solid rgba(245,230,200,0.3); background: rgba(44,24,16,0.3); color: rgba(245,230,200,0.8); border-radius: var(--radius-sm); padding: 6px 12px; font-size: .78rem; font-family: var(--font-body); cursor: pointer; font-weight: 600; letter-spacing: .05em; transition: border-color .2s; }
    .cs-util-btn:hover { border-color: var(--color-secondary); color: var(--color-secondary); }
    .back-home { display: inline-flex; align-items: center; gap: 6px; margin-top: 16px; font-size: .825rem; color: rgba(245,230,200,0.6); text-decoration: none; transition: color .2s; }
    .back-home:hover { color: var(--color-secondary); }
  </style>
  <script src="assets/js/theme.js"></script><script src="assets/js/rtl.js"></script>
</head>
<body>
<div class="cs-utils">
  <button class="cs-util-btn rtl-btn" data-rtl-toggle>RTL</button>
  <button class="cs-util-btn" data-theme-toggle id="cs-theme-btn" aria-label="Toggle theme"><i class="fa-solid fa-moon" aria-hidden="true"></i></button>
</div>

<div class="coming-soon-page" aria-label="Coming soon page">
  <!-- Background -->
  <div class="cs-bg" aria-hidden="true">
    <img src="https://images.unsplash.com/photo-1497034825429-c343d7c6a68f?w=1600&q=85&auto=format&fit=crop" alt="" />
  </div>
  <div class="cs-overlay" aria-hidden="true"></div>

  <div class="cs-content">
    <div class="cs-logo" aria-label="NOVA"><img src="assets/images/logo.svg" alt="NOVA" /></div>
    <p class="cs-eyebrow"><i class="fa-solid fa-star" aria-hidden="true"></i> &nbsp; Something extraordinary is coming</p>
    <h1 class="cs-title">A New Flavour Is Being Born</h1>
    <p class="cs-subtitle">We've been working on something exceptional. Something the city has never tasted before. Be the first to know when it's ready.</p>

    <!-- Countdown -->
    <div class="countdown-timer" id="countdown-timer" role="timer" aria-live="polite" aria-label="Countdown timer"></div>

    <!-- Notify Form -->
    <form id="notify-form" novalidate aria-label="Get notified when we launch">
      <div class="cs-form">
        <input type="email" class="cs-input" id="notify-email" placeholder="Enter your email address" required aria-label="Email address for launch notification" />
        <button type="submit" class="btn btn-secondary" id="notify-submit-btn">
          <i class="fa-solid fa-bell" aria-hidden="true"></i> Notify Me
        </button>
      </div>
    </form>
    <p class="cs-privacy"><i class="fa-solid fa-lock" aria-hidden="true"></i> We'll only contact you about this launch. No spam.</p>

    <!-- Social Links -->
    <div class="cs-social" aria-label="Follow us on social media">
      <a href="#" class="cs-social-link" aria-label="Instagram" id="cs-instagram"><i class="fa-brands fa-instagram" aria-hidden="true"></i></a>
      <a href="#" class="cs-social-link" aria-label="Facebook" id="cs-facebook"><i class="fa-brands fa-facebook-f" aria-hidden="true"></i></a>
      <a href="#" class="cs-social-link" aria-label="Pinterest" id="cs-pinterest"><i class="fa-brands fa-pinterest-p" aria-hidden="true"></i></a>
      <a href="#" class="cs-social-link" aria-label="TikTok" id="cs-tiktok"><i class="fa-brands fa-tiktok" aria-hidden="true"></i></a>
    </div>

    <a href="index.html" class="back-home" id="back-to-home-btn">
      <i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back to NOVA
    </a>
  </div>
</div>

<script src="assets/js/loyalty.js"></script>
<script src="assets/js/main.js"></script>
</body>
</html>
