<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — NOVA Ice Cream</title>
  <meta name="description" content="Log in to your NOVA account to manage your orders, track loyalty reward points, and check out faster." />
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- FontAwesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/luxury-components.css" />
  <link rel="stylesheet" href="assets/css/dark-mode.css" />
  <link rel="stylesheet" href="assets/css/rtl.css" />

  <!-- Theme and RTL Scripts (Run immediately to prevent visual flash) -->
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/rtl.js"></script>
</head>
<body class="auth-body">

  <div class="auth-page">
    
    <!-- RTL and Dark Mode toggles positioned at top right corner -->
    <div class="auth-page-utils">
      <button class="util-btn rtl-btn" data-rtl-toggle aria-label="Switch to RTL">RTL</button>
      <button class="util-btn" data-theme-toggle aria-label="Switch to dark mode" title="Switch to dark mode">
        <i class="fa-solid fa-moon" aria-hidden="true"></i>
      </button>
    </div>



    <!-- Right form panel -->
    <div class="auth-form-side">
      <div class="auth-card">
        
        <!-- Logo -->
        <a href="index.html" class="auth-card-logo" aria-label="NOVA Home">
          <img src="assets/images/logo.svg" alt="NOVA Logo" />
          <span>NOVA</span>
        </a>

        <!-- Header -->
        <div class="auth-header" style="margin-bottom: 28px;">
          <h3 style="font-family: var(--font-heading); font-size: var(--text-h3); margin-bottom: 8px;">Welcome Back</h3>
          <p style="font-size: var(--text-small); color: var(--color-text-secondary);">Log in to manage orders and rewards</p>
        </div>

        <!-- Form -->
        <form class="auth-form" id="login-form">
          <div class="form-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" class="form-input" required placeholder="name@example.com" style="width:100%;" />
          </div>

          <div class="form-group" style="position: relative;">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" class="form-input" required placeholder="Enter your password" style="width:100%; padding-inline-end: 44px;" />
            <button type="button" class="pw-toggle-btn" data-pw-toggle="login-password" aria-label="Toggle password visibility" style="position: absolute; right: 14px; bottom: 12px;">
              <i class="fa-solid fa-eye-slash" aria-hidden="true"></i>
            </button>
          </div>

          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: 0.85rem;">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--color-text-primary);">
              <input type="checkbox" style="accent-color: var(--color-primary); cursor: pointer;" /> Remember me
            </label>
            <a href="#" style="color: var(--color-primary); font-weight: 500; text-decoration: none;">Forgot Password?</a>
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%; min-height: 48px; border-radius: var(--radius-md);">Log In</button>
        </form>

        <!-- Switch Option -->
        <div class="auth-footer" style="margin-top: 28px; text-align: center; font-size: 0.875rem; color: var(--color-text-secondary);">
          Don't have an account? <a href="signup.html" style="color: var(--color-primary); font-weight: 600; text-decoration: none;">Sign Up</a>
        </div>



      </div>
    </div>

  </div>

  <!-- Javascript -->
  <script src="assets/js/main.js"></script>
</body>
</html>
