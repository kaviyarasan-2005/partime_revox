<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us & Studio Location — Petali Resin Jewelry Studio</title>
  <meta name="description" content="Reach out to Petali Studio. Ship us your flowers, register for botanical resin workshops, or consult with our lead artisan.">
  <meta name="theme-color" content="#F8F5F0">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/navbar.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/footer.css">
  
  <!-- Theme Manager JS -->
  <script src="../assets/js/theme.js"></script>
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body>

  <!-- Page Loader -->
  <div id="pageLoader">
    <div class="loader-ring"></div>
  </div>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden; /* No scroll */
    }
    .error-hero {
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: cover;
      background-position: center;
      background-image: linear-gradient(rgba(248, 245, 240, 0.9), rgba(248, 245, 240, 0.9)), url('../assets/img/pressed_botanicals.png');
      color: var(--text-primary);
    }
    [data-theme="dark"] .error-hero {
      background-image: linear-gradient(rgba(17, 24, 39, 0.85), rgba(17, 24, 39, 0.85)), url('../assets/img/pressed_botanicals.png');
    }
  </style>

  <!-- Navigation Bar (Minimal) -->
  <nav class="navbar" style="position: absolute; background: transparent; box-shadow: none;">
    <div class="navbar-inner">
      <a href="../index.html" class="navbar-brand">
        <div class="brand-logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path>
            <path d="M12 6a6 6 0 0 0-6 6c0 2.22 .9 4.22 2.36 5.66L12 12l3.64 5.66A6 6 0 0 0 18 12a6 6 0 0 0-6-6z"></path>
            <circle cx="12" cy="12" r="1.5"></circle>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">Petali</span>
        </div>
      </a>

      <div class="navbar-actions">
        <!-- Theme Toggle -->
        <button class="theme-toggle" aria-label="Toggle Theme">
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>

        <!-- RTL Toggle -->
        <button class="rtl-toggle" aria-label="Toggle Direction">
          <span>RTL</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- 404 Hero Section -->
  <section class="error-hero">
    <div class="container text-center fade-up" style="max-width: 600px; padding: var(--sp-10) 0;">
      <!-- Styled Botanical Leaf Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-4" style="margin: 0 auto; color: var(--color-rose);">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"></path>
      </svg>
      
      <div style="font-size: 4rem; font-weight: bold; letter-spacing: 4px; margin-bottom: 1rem; color: var(--color-rose);">404</div>
      <h1 class="mb-4" style="font-size: 3rem;">Blossom Not Found</h1>
      <p class="mb-8" style="font-size: 1.2rem; color: var(--text-muted); margin-bottom: 2.5rem;">The botanical path you followed seems to have withered away, or perhaps it was never planted in our studio garden.</p>
      
      <div class="flex-center gap-3" style="flex-wrap: wrap;">
        <a href="../index.html" class="btn btn-rose btn-rounded">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
          Return to Home
        </a>
      </div>
    </div>
  </section>




  <!-- Scripts -->
  <script src="../assets/js/main.js"></script>
</body>
</html>
