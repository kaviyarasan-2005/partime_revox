<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Log in to your Glint account to track your vehicle's ceramic coating warranty and maintenance schedule." />
  <title>Log In — Glint</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/navbar.css" />
  <link rel="stylesheet" href="../assets/css/footer.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <script>
    (function(){const t=localStorage.getItem('cc-theme'),d=localStorage.getItem('cc-dir');if(t)document.documentElement.setAttribute('data-theme',t);if(d){document.documentElement.setAttribute('dir',d);document.documentElement.setAttribute('lang',d==='rtl'?'ar':'en');}})();
  </script>
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
  <style>
    .auth-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-9) var(--sp-5);
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
    }
    .auth-card {
      width: 100%;
      max-width: 480px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: var(--sp-8);
      box-shadow: var(--shadow-lg);
    }
    .auth-header {
      text-align: center;
      margin-bottom: var(--sp-6);
    }
    .auth-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: var(--radius-lg);
      background: var(--color-blue-glow);
      color: var(--color-ceramic-blue);
      margin-bottom: var(--sp-4);
    }
    .auth-footer {
      text-align: center;
      margin-top: var(--sp-6);
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }
    .auth-footer a {
      font-weight: 600;
    }
    @media (max-width: 639px) {
      .auth-card {
        padding: var(--sp-5);
      }
    }
  </style>
</head>
<body>
<div id="pageLoader" role="status" aria-label="Loading"><div class="loader-ring"></div></div>


<!-- TOP CONTROLS -->
<div style="position: absolute; top: var(--sp-4); inset-inline-end: var(--sp-5); z-index: 100; display: flex; gap: var(--sp-2);">
  <button class="theme-toggle" id="themeToggle" aria-label="Switch to dark mode" title="Toggle Theme" style="background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:8px; cursor:pointer; color:var(--text-primary);">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" aria-hidden="true"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  </button>
  <button class="rtl-toggle" id="rtlToggle" aria-label="Switch to RTL mode" title="Toggle RTL/LTR" style="background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:8px 12px; cursor:pointer; color:var(--text-primary); font-weight:600; font-size:var(--text-sm);">
    <span>RTL</span>
  </button>
</div>

<!-- AUTH CONTENT -->
<main class="auth-section">
  <div class="auth-card fade-up">
    <div class="auth-header">
            <a href="../index.html" class="auth-brand" aria-label="Glint Home" style="display:inline-flex; align-items:center; gap:12px; text-decoration:none; margin-bottom:var(--sp-4);">
        <div class="auth-logo" style="margin-bottom:0; width:48px; height:48px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 2L3 7v5c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z"/></svg>
        </div>
        <div style="font-family:var(--font-display); font-size:1.5rem; font-weight:700; letter-spacing:0.5px; color:var(--text-primary);">Glint</div>
      </a>
      <h2>Welcome Back</h2>
      <p class="text-muted" style="margin-top:var(--sp-2);">Enter your credentials to access your dashboard.</p>
    </div>
    
    <form action="dashboard-user.html" method="GET" data-validate>
      <div class="form-group">
        <label for="login-email" class="form-label">Email Address</label>
        <input type="email" id="login-email" name="email" class="form-control" required placeholder="john@example.com" data-error-required="Email is required." data-error-email="Please provide a valid email." />
        <div class="form-error"></div>
      </div>
      
      <div class="form-group">
        <div class="flex-between mb-2">
          <label for="login-password" class="form-label" style="margin-bottom:0;">Password</label>
          <a href="#" class="text-xs">Forgot?</a>
        </div>
        <input type="password" id="login-password" name="password" class="form-control" required placeholder="••••••••" data-error-required="Password is required." />
        <div class="form-error"></div>
      </div>
      
      <button type="submit" class="btn btn-primary w-full mt-4">Log In</button>
    </form>

    <div class="auth-separator" style="margin: var(--sp-6) 0; display: flex; align-items: center; text-align: center; color: var(--text-muted); font-size: var(--text-sm);">
      <hr style="flex: 1; border: 0; border-top: 1px solid var(--border-color); margin: 0 var(--sp-3);" />
      Or continue with
      <hr style="flex: 1; border: 0; border-top: 1px solid var(--border-color); margin: 0 var(--sp-3);" />
    </div>

    <div class="social-login" style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-3); margin-bottom: var(--sp-6);">
      <button class="btn btn-outline" style="width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px;">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" style="flex-shrink: 0;"><path fill="#EA4335" d="M23.49 12.275c0-.79-.07-1.54-.19-2.275H12v4.51h6.476a5.526 5.526 0 01-2.396 3.626v3.015h3.868c2.26-2.08 3.542-5.16 3.542-8.876z"/><path fill="#34A853" d="M12 24c3.24 0 5.95-1.076 7.936-2.91l-3.868-3.016c-1.076.72-2.456 1.15-3.968 1.15-3.048 0-5.63-2.056-6.556-4.816H1.54v3.12C3.52 21.436 7.42 24 12 24z"/><path fill="#FBBC05" d="M5.444 14.408a7.228 7.228 0 01-.384-2.408c0-.84.14-1.65.384-2.408V6.472H1.54A11.968 11.968 0 000 12c0 1.93.46 3.76 1.28 5.4l4.164-2.992z"/><path fill="#4285F4" d="M12 4.776c1.76 0 3.34.606 4.58 1.796l3.436-3.436C17.94 1.186 15.23 0 12 0 7.42 0 3.52 2.564 1.54 6.472l3.904 3.12c.926-2.76 3.508-4.816 6.556-4.816z"/></svg>
        Google
      </button>
      <button class="btn btn-outline" style="width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px;">
        <svg viewBox="0 0 384 512" fill="currentColor" width="18" height="18" aria-hidden="true" style="margin-bottom: 2px; flex-shrink: 0;"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.1-44.6-35.9-2.8-74.3 22.7-93.1 22.7-18.9 0-46.5-22.3-80.5-22.3-37.4 0-72.2 21.2-91.8 54.4-40.2 68.6-10.4 170.1 28.5 226.4 18.9 27.2 41.3 57.6 71.3 56.4 28.5-1.1 39.8-18.6 74-18.6 34.2 0 44.5 18.6 74.5 18.1 31.4-.4 50.8-28.7 69.3-56.1 21.3-31.5 30-62 30.5-63.5-1.1-.4-48.4-18.6-48.6-88.1zM245.9 78.4c15.7-19 26.5-45.5 23.6-72.1-23.1 1-52.1 15.6-68.5 34.2-13.3 14.9-25.5 42.1-22.1 68.1 25.8 2 51.3-11.2 67-30.2z"/></svg>
        Apple
      </button>
    </div>
    
    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Sign Up</a>
    </div>
  </div>
</main>

<!-- FOOTER REMOVED -->

<div class="toast-container" role="region" aria-live="polite"></div>
<script src="../assets/js/theme.js"></script>
<script src="../assets/js/navbar.js"></script>
<script src="../assets/js/main.js"></script>
</body>
</html>
