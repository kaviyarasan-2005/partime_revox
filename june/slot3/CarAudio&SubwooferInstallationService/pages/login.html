<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your CarAudio Pro account to view your bookings, warranties, and service history.">
  <meta name="robots" content="noindex, nofollow">
  <title>Sign In — CarAudio Pro</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">

  <style>
    /* ═══════════════════════════════════════════════════════════
       LOGIN PAGE — page-specific styles
       Goals:
         #3  No navbar
         #4  No footer
         #5  Single-viewport fit (no vertical scroll)
         #7  Brand centered inside the form card
    ═══════════════════════════════════════════════════════════ */

    /* Reset body for auth pages — no scrollbar, no top padding */
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      background: var(--color-bg);
    }

    /* ── Centered single-column layout ── */
    .auth-page {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      padding: var(--space-6);
    }

    /* ── Toggles ── */
    .auth-toggles {
      position: fixed;
      top: var(--space-5);
      right: var(--space-5);
      display: flex;
      gap: var(--space-2);
    }

    /* ── Form card ── */
    .auth-right-inner {
      width: 100%;
      max-width: 420px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: var(--space-8);
    }

    /* Brand centered at top of form card */
    .auth-form-brand {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--space-3);
      text-decoration: none;
      margin-bottom: var(--space-6);
    }
    .auth-form-brand-logo {
      width: 44px;
      height: 44px;
      background: var(--color-primary);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-blue);
      flex-shrink: 0;
    }
    .auth-form-brand-logo svg { width: 22px; height: 22px; fill: #fff; }
    .auth-form-brand-name {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 800;
      color: var(--color-text);
      line-height: 1.1;
    }
    .auth-form-brand-name span { color: var(--color-primary); }

    /* Form header */
    .auth-header {
      text-align: center;
      margin-bottom: var(--space-6);
    }
    .auth-title {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 800;
      color: var(--color-text);
      margin-bottom: var(--space-1);
    }
    .auth-subtitle {
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
    }

    /* Social buttons */
    .btn-social {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      color: var(--color-text);
      padding: 10px var(--space-4);
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: var(--text-sm);
      font-family: var(--font-display);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .btn-social:hover {
      background: var(--color-bg-alt);
      border-color: var(--color-border-strong);
    }
    .btn-social svg { width: 18px; height: 18px; }
    .social-buttons {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }

    /* Divider */
    .auth-divider {
      display: flex;
      align-items: center;
      margin-bottom: var(--space-5);
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--color-border);
    }
    .auth-divider span {
      padding: 0 var(--space-3);
      color: var(--color-text-muted);
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    /* Form fields */
    .form-group { margin-bottom: var(--space-4); }
    .form-label {
      display: block;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: var(--space-2);
      font-family: var(--font-display);
    }
    .form-control {
      width: 100%;
      padding: 10px var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      color: var(--color-text);
      font-family: inherit;
      font-size: var(--text-base);
      transition: all var(--transition-fast);
    }
    .form-control:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(26,111,219,0.12);
    }

    /* Password show/hide */
    .password-wrap { position: relative; }
    .btn-show-pass {
      position: absolute;
      right: var(--space-3);
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--color-text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      line-height: 0;
    }
    .btn-show-pass:hover { color: var(--color-primary); }

    /* Remember + forgot */
    .auth-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-5);
    }
    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      cursor: pointer;
    }
    .auth-link {
      font-size: var(--text-sm);
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 600;
      transition: color var(--transition-fast);
    }
    .auth-link:hover { color: var(--color-primary-hover); }

    /* Submit button */
    .btn-submit-login {
      width: 100%;
      height: 44px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition-base);
      box-shadow: var(--shadow-blue);
    }
    .btn-submit-login:hover {
      background: var(--color-primary-hover);
      box-shadow: var(--shadow-blue-lg);
      transform: translateY(-1px);
    }

    /* Register CTA */
    .auth-register-cta {
      text-align: center;
      margin-top: var(--space-5);
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      html, body { overflow-y: auto; }
      .auth-page { height: auto; min-height: 100vh; overflow-y: auto; padding-top: 60px; align-items: flex-start; }
    }
    @media (max-width: 360px) {
      html, body { overflow-y: auto; }
      .auth-page { height: auto; min-height: 100vh; overflow-y: auto; padding-top: 60px; align-items: flex-start; }
    }
  </style>

  <!-- FontAwesome 6 CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../tailwind-config.js"></script>
</head>
<body>

<!-- #3 — NO NAVBAR on login page -->
<!-- #4 — NO FOOTER on login page -->

<div class="auth-page">

  <!-- Toggles (floating) -->
  <div class="auth-toggles">
    <button data-theme-toggle class="btn btn-ghost btn-sm btn-icon" aria-label="Toggle dark mode" title="Toggle theme">
      <span class="theme-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </span>
    </button>
    <button data-rtl-toggle class="btn btn-ghost btn-sm" aria-label="Toggle RTL layout" aria-pressed="false" title="Toggle RTL" style="gap:6px;">
      <span class="rtl-toggle-label">LTR</span>
    </button>
  </div>

  <div class="auth-right-inner">

      <!-- #7 — Brand centered at top of form -->
      <a href="../index.html" class="auth-form-brand" aria-label="CarAudio Pro Home">
        <div class="auth-form-brand-logo">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
        </div>
        <div class="auth-form-brand-name">CarAudio<span>Pro</span></div>
      </a>

      <!-- Form heading -->
      <div class="auth-header">
        <h1 class="auth-title">Sign In</h1>
        <p class="auth-subtitle">Access your account to manage bookings and warranties</p>
      </div>

      <!-- Social Sign-in Buttons -->
      <div class="social-buttons">
        <button class="btn-social" type="button" id="btn-google-signin">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
        <button class="btn-social" type="button" id="btn-apple-signin">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
            <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
          </svg>
          Continue with Apple
        </button>
      </div>

      <!-- Divider -->
      <div class="auth-divider"><span>or sign in with email</span></div>

      <!-- Login Form -->
      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="btn-show-pass" aria-label="Toggle password visibility" id="btn-show-pass">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="auth-options">
          <label class="checkbox-wrap">
            <input type="checkbox" name="remember" id="remember-me">
            <span>Remember me</span>
          </label>
          <a href="#" class="auth-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit-login" id="btn-login-submit">Sign In</button>
      </form>

      <!-- Register CTA -->
      <p class="auth-register-cta">
        Don't have an account? <a href="register.html" class="auth-link">Create Account</a>
      </p>

    </div><!-- /.auth-right-inner -->

</div><!-- /.auth-page -->

<!-- Toast container (used by main.js) -->
<div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="false" role="status"></div>

<script src="../assets/js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {

    /* ── Password show / hide ── */
    const toggleBtn = document.getElementById('btn-show-pass');
    const passInput = document.getElementById('password');
    const eyeOpen  = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const eyeClosed = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22"/></svg>`;

    if (toggleBtn && passInput) {
      toggleBtn.addEventListener('click', () => {
        const visible = passInput.type === 'text';
        passInput.type = visible ? 'password' : 'text';
        toggleBtn.innerHTML = visible ? eyeOpen : eyeClosed;
        toggleBtn.setAttribute('aria-label', visible ? 'Show password' : 'Hide password');
      });
    }

    /* ── Form submit ── */
    const form    = document.getElementById('login-form');
    const submitBtn = document.getElementById('btn-login-submit');

    if (form && submitBtn) {
      form.addEventListener('submit', (e) => {
        e.preventDefault();

        // Simple client-side required check
        const email = document.getElementById('email');
        const pass  = document.getElementById('password');
        if (!email.value.trim() || !pass.value) {
          window.CarAudio?.ToastManager?.show('Please fill in all fields.', 'error');
          return;
        }

        submitBtn.textContent = 'Signing in…';
        submitBtn.disabled = true;

        // Simulate auth — redirect to dashboard after short delay
        setTimeout(() => {
          window.location.href = '../user-dashboard.html';
        }, 900);
      });
    }

    /* ── Social buttons (demo) ── */
    document.getElementById('btn-google-signin')?.addEventListener('click', () => {});
    document.getElementById('btn-apple-signin')?.addEventListener('click', () => {});

  });
</script>
</body>
</html>
