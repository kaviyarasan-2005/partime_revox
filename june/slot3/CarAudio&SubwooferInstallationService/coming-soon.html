<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CarAudio Pro — Custom Mobile Tuning Crossover. We are launching our premium DSP acoustic diagnostic systems soon.">
  <meta name="robots" content="noindex, nofollow">
  <title>Tuning Center Launching Soon — CarAudio Pro</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  
  <!-- FontAwesome 6 CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="tailwind-config.js"></script>
</head>
<body class="bg-secondary-bg text-textColor-base transition-colors duration-300 min-h-screen flex items-center justify-center py-12 px-6 relative overflow-hidden">
  
<!-- Background visual -->
<div class="absolute inset-0 z-0">
  <img src="assets/images/hero-bg.jpg" class="w-full h-full object-cover opacity-10" alt="Sound visualizer back">
</div>

<div class="max-w-xl w-full text-center glass-card p-12 rounded-3xl shadow-2xl relative z-10">
  <!-- Brand logo -->
  <a href="index.html" class="navbar-brand justify-center mb-8 inline-flex">
    <div class="brand-logo" aria-hidden="true">
      <i class="fa-solid fa-volume-high text-white"></i>
    </div>
    <div class="brand-text">
      <div class="brand-name" style="color:var(--color-text);">CarAudio<span class="text-primary">Pro</span></div>    </div>
  </a>

  <span class="text-xs font-bold text-accent uppercase tracking-widest block mb-2">DSP Diagnostics launch</span>
  <h1 class="font-display text-2xl sm:text-4xl font-extrabold text-textColor-base leading-tight mb-4">Tuning Center Launching Soon</h1>
  <p class="text-textColor-secondary text-sm mb-10 leading-relaxed max-w-sm mx-auto">
    We are calibrating our real-time acoustic signal diagnostic tools. Get notified the second we launch our mobile time-alignment services.
  </p>

  <!-- Countdown Timer -->
  <div class="grid grid-cols-4 gap-4 max-w-sm mx-auto mb-10 text-center" role="region" aria-label="Time remaining until launch">
    <div class="p-3 bg-secondary-bg border border-secondary/10 rounded-xl">
      <span class="text-2xl sm:text-3xl font-display font-bold text-textColor-base block" id="days">30</span>
      <span class="text-[10px] uppercase text-textColor-muted font-bold tracking-wider">Days</span>
    </div>
    <div class="p-3 bg-secondary-bg border border-secondary/10 rounded-xl">
      <span class="text-2xl sm:text-3xl font-display font-bold text-textColor-base block" id="hours">12</span>
      <span class="text-[10px] uppercase text-textColor-muted font-bold tracking-wider">Hours</span>
    </div>
    <div class="p-3 bg-secondary-bg border border-secondary/10 rounded-xl">
      <span class="text-2xl sm:text-3xl font-display font-bold text-textColor-base block" id="mins">45</span>
      <span class="text-[10px] uppercase text-textColor-muted font-bold tracking-wider">Mins</span>
    </div>
    <div class="p-3 bg-secondary-bg border border-secondary/10 rounded-xl">
      <span class="text-2xl sm:text-3xl font-display font-bold text-textColor-base block" id="secs">00</span>
      <span class="text-[10px] uppercase text-textColor-muted font-bold tracking-wider">Secs</span>
    </div>
  </div>

  <!-- Subscription Form -->
  <form class="max-w-md mx-auto flex flex-col sm:flex-row gap-3 mb-8" data-newsletter>
    <div class="flex-1">
      <input type="email" class="form-control h-12" placeholder="Enter your email address" required aria-label="Email Address">
    </div>
    <button type="submit" class="btn btn-primary h-12 px-8 hover-glow">Notify Me</button>
  </form>

  <div class="flex justify-center gap-4 text-textColor-secondary text-sm">
    <a href="index.html" class="hover:underline font-bold text-primary"><i class="fa-solid fa-house"></i> Home Page</a>
    <span>·</span>
    <a href="contact.html" class="hover:underline font-bold text-primary"><i class="fa-solid fa-map-location-dot"></i> Check Coverage</a>
  </div>
</div>

<div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="false" role="status"></div>

<script src="assets/js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Simple 30-day countdown timer loop
    const targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + 30);
    
    const updateCountdown = () => {
      const now = new Date();
      const diff = targetDate - now;
      
      if (diff <= 0) {
        document.getElementById('days').textContent = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('mins').textContent = '00';
        document.getElementById('secs').textContent = '00';
        return;
      }
      
      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);
      
      document.getElementById('days').textContent = String(d).padStart(2, '0');
      document.getElementById('hours').textContent = String(h).padStart(2, '0');
      document.getElementById('mins').textContent = String(m).padStart(2, '0');
      document.getElementById('secs').textContent = String(s).padStart(2, '0');
    };
    
    setInterval(updateCountdown, 1000);
    updateCountdown();
  });
</script>
</body>
</html>
